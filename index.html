<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Library Seat Booking</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="IT24103832.js"></script>
</head>
<body>

    <h1 id="pageTitle">University Library Seat Booking</h1>

    <img id="libraryImage" src="images\library1.jpg" width="400">

    <p id="infoText">Reserve your study seat in advance.</p>

    <hr>

    <h2>Book a Seat</h2>

    <form id="bookingForm">
        <label for="studentName">Student Name:</label><br>
        <input type="text" id="studentName"><br><br>

        <label for="studentEmail">Student Email:</label><br>
        <input type="email" id="studentEmail"><br><br>

        <input type="submit" value="Book Seat">
    </form>

    <hr>

    <h2>Seat Categories</h2>
    <table border="1" cellpadding="8" cellspacing="0" id="seatTable">
        <tr>
            <th>Seat Type</th>
            <th>Floor</th>
        </tr>
        <tr>
            <td>Silent Study</td>
            <td>1st Floor</td>
        </tr>
        <tr>
            <td>Group Study</td>
            <td>2nd Floor</td>
        </tr>
    </table>

    <hr>

    <h2>Booked Seats</h2>
    <table border="1" cellpadding="8" cellspacing="0" id="bookingTable">
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Action</th>
        </tr>
    </table>
</body>
</html>
